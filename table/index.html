<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Table Example</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Dark mode toggle-->
    <div class="theme-toggle" id="theme-toggle">Dark Mode</div>
    <!--container-->
    <div class="container">
        <h1>Most Active User</h1>
        <!--lorder-->
        <div class="spinner" id="spinner" style="display: none;">
            <i class="fas fa-cog fa-spin"></i>
        </div>
        <!--table-->
        <table id="data-table" style="display: none">
            <thead>
                <tr>
                    <th onclick="sortTable(0)" class="name-column">Name <i class="fas fa-sort" id="icon-0"></i></th>
                     <th onclick="sortTable(1)" class="email-column">Email <i class="fas fa-sort" id="icon-1"></i></th>
                      <th onclick="sortTable(2)" class="username-column">Username <i class="fas fa-sort" id="icon-2"></i></th>
                       <th onclick="sortTable(3)" class="country-column">Country<i class="fas fa-sort" id="icon-3"></i></th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!--dynamically add rows -->
                 </tbody>
        </table>
        <!--Pagination-->
        <div class="pagination" id="pagination" "display: none">
           <button type="button" id="prev-btn" tittle="previous-page" onclick="prevPage()">
            <i class="fas fa-chevron-left"></i>
           </button>
           <span id="page-number">1</span>
            <button type="button" id="next-btn" tittle="next-page" onclick="nextPage()">
            <i class="fas fa-chevron-right"></i>
           </button>
        </div>
    </div>

 

     <!--script-->
    <script src="script.js"></script>
</body>
</html>
